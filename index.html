<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Healthcare API Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; }
    .topbar { background: #111; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 16px; font-weight: 500; }
    .topbar span { font-size: 12px; opacity: 0.6; }
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 1rem; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 500; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; color: #333; }
    .tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; }
    .tab { padding: 8px 18px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: #fff; color: #555; }
    .tab.active { background: #111; color: #fff; border-color: #111; }
    .section { display: none; } .section.active { display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
    input:focus, select:focus { outline: none; border-color: #111; }
    .btn { padding: 8px 16px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
    .btn:hover { background: #f5f5f5; }
    .btn-primary { background: #111; color: #fff; border-color: #111; }
    .btn-primary:hover { background: #333; }
    .btn-danger { color: #dc2626; border-color: #fca5a5; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .url-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 10px 14px; }
    .url-bar label { margin: 0; white-space: nowrap; font-size: 12px; color: #888; }
    .url-bar input { border: none; font-family: monospace; font-size: 13px; flex: 1; padding: 0; }
    .url-bar input:focus { outline: none; }
    .patient-row { background: #f9f9f9; border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .patient-row h3 { font-size: 14px; font-weight: 500; }
    .patient-row p { font-size: 12px; color: #777; margin-top: 3px; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #e0f2fe; color: #0369a1; margin-left: 6px; }
    .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.success { background: #dcfce7; color: #166534; }
    .toast.error { background: #fef2f2; color: #991b1b; }
    .toast.show { opacity: 1; }
    .empty { text-align: center; color: #aaa; font-size: 13px; padding: 2rem; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>Healthcare API Dashboard</h1>
  <span>NoDO-02 · Dockerized Flask Service</span>
</div>

<div class="container">

  <div class="url-bar">
    <label>API URL</label>
    <input id="baseUrl" type="text" value="http://localhost:5001" />
    <button class="btn btn-sm" onclick="checkHealth()">Check health</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalCount">—</div><div class="stat-label">total patients</div></div>
    <div class="stat"><div class="stat-num" id="apiStatus">—</div><div class="stat-label">API status</div></div>
    <div class="stat"><div class="stat-num" id="lastAction">—</div><div class="stat-label">last action</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('list')">Patient list</button>
    <button class="tab" onclick="switchTab('add')">Add patient</button>
    <button class="tab" onclick="switchTab('edit')">Lookup / edit</button>
  </div>

  <!-- LIST -->
  <div id="tab-list" class="section active">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span class="card-title" style="margin:0">All patients</span>
        <button class="btn btn-sm" onclick="loadPatients()">Refresh</button>
      </div>
      <div id="patientList"><div class="empty">Click refresh to load</div></div>
    </div>
  </div>

  <!-- ADD -->
  <div id="tab-add" class="section">
    <div class="card">
      <div class="card-title">New patient record</div>
      <div class="form-grid">
        <div><label>Full name *</label><input id="c-name" placeholder="Ravi Kumar" /></div>
        <div><label>Age *</label><input id="c-age" type="number" placeholder="35" /></div>
        <div><label>Gender *</label>
          <select id="c-gender"><option value="">Select...</option><option>Male</option><option>Female</option><option>Other</option></select>
        </div>
        <div><label>Contact *</label><input id="c-contact" placeholder="9876543210" /></div>
        <div><label>Blood group</label>
          <select id="c-blood"><option value="">Select...</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option></select>
        </div>
        <div><label>Diagnosis</label><input id="c-diagnosis" placeholder="Hypertension" /></div>
      </div>
      <div style="margin-top:1rem">
        <button class="btn btn-primary" onclick="createPatient()">Add patient</button>
      </div>
    </div>
  </div>

  <!-- EDIT -->
  <div id="tab-edit" class="section">
    <div class="card">
      <div class="card-title">Lookup patient</div>
      <div style="display:flex;gap:8px">
        <input id="lookupId" type="number" placeholder="Patient ID" style="width:140px" />
        <button class="btn" onclick="lookupPatient()">Fetch</button>
        <button class="btn btn-danger btn-sm" onclick="deletePatient()">Delete</button>
      </div>
      <div id="lookupResult" style="margin-top:1rem"></div>
    </div>
    <div class="card" id="editCard" style="display:none">
      <div class="card-title">Edit patient</div>
      <div class="form-grid">
        <div><label>Full name</label><input id="e-name" /></div>
        <div><label>Age</label><input id="e-age" type="number" /></div>
        <div><label>Gender</label>
          <select id="e-gender"><option>Male</option><option>Female</option><option>Other</option></select>
        </div>
        <div><label>Contact</label><input id="e-contact" /></div>
        <div><label>Blood group</label>
          <select id="e-blood"><option value="">Select...</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option></select>
        </div>
        <div><label>Diagnosis</label><input id="e-diagnosis" /></div>
      </div>
      <div style="margin-top:1rem">
        <button class="btn btn-primary" onclick="updatePatient()">Save changes</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let currentEditId = null;
  function getBase(){ return document.getElementById('baseUrl').value.replace(/\/$/,''); }

  function toast(msg, ok=true){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (ok ? 'success' : 'error') + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function switchTab(name){
    document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['list','add','edit'][i] === name));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
  }

  async function checkHealth(){
    try {
      const r = await fetch(getBase()+'/health');
      const d = await r.json();
      document.getElementById('apiStatus').textContent = d.status === 'healthy' ? 'online' : 'error';
      toast('API is healthy');
      loadPatients();
    } catch(e) {
      document.getElementById('apiStatus').textContent = 'offline';
      toast('Cannot reach API', false);
    }
  }

  async function loadPatients(){
    try {
      const r = await fetch(getBase()+'/api/patients/');
      const d = await r.json();
      document.getElementById('totalCount').textContent = d.count;
      const el = document.getElementById('patientList');
      if(!d.patients.length){ el.innerHTML = '<div class="empty">No patients yet</div>'; return; }
      el.innerHTML = d.patients.map(p => `
        <div class="patient-row">
          <div>
            <h3>${p.name}<span class="badge">${p.blood_group || '—'}</span></h3>
            <p>${p.age}y · ${p.gender} · ${p.contact}</p>
            ${p.diagnosis ? `<p style="margin-top:4px;font-style:italic">${p.diagnosis}</p>` : ''}
          </div>
          <div class="actions">
            <button class="btn btn-sm" onclick='prefillEdit(${JSON.stringify(p)})'>Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteById(${p.id})">Delete</button>
          </div>
        </div>`).join('');
    } catch(e){ toast('Failed to load patients', false); }
  }

  async function createPatient(){
    const body = {
      name: document.getElementById('c-name').value,
      age: parseInt(document.getElementById('c-age').value),
      gender: document.getElementById('c-gender').value,
      contact: document.getElementById('c-contact').value,
      blood_group: document.getElementById('c-blood').value || undefined,
      diagnosis: document.getElementById('c-diagnosis').value || undefined
    };
    try {
      const r = await fetch(getBase()+'/api/patients/', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
      const d = await r.json();
      if(r.ok){ toast(`Patient "${d.name}" added!`); document.getElementById('lastAction').textContent='created'; loadPatients(); switchTab('list'); }
      else toast(d.error || 'Error', false);
    } catch(e){ toast('Cannot reach API', false); }
  }

  async function lookupPatient(){
    const id = document.getElementById('lookupId').value;
    if(!id) return;
    try {
      const r = await fetch(getBase()+'/api/patients/'+id);
      const d = await r.json();
      if(r.ok){
        document.getElementById('lookupResult').innerHTML = `
          <div class="patient-row">
            <div>
              <h3>${d.name}<span class="badge">ID ${d.id}</span></h3>
              <p>${d.age}y · ${d.gender} · ${d.contact} · ${d.blood_group || 'no blood group'}</p>
              ${d.diagnosis ? `<p style="font-style:italic;margin-top:4px">${d.diagnosis}</p>` : ''}
              <p style="font-size:11px;color:#aaa;margin-top:4px">Created: ${new Date(d.created_at).toLocaleString()}</p>
            </div>
          </div>`;
        prefillEdit(d);
      } else {
        document.getElementById('lookupResult').innerHTML = `<p style="color:#dc2626;font-size:13px">Patient not found</p>`;
        document.getElementById('editCard').style.display = 'none';
      }
    } catch(e){ toast('Cannot reach API', false); }
  }

  function prefillEdit(p){
    currentEditId = p.id;
    document.getElementById('e-name').value = p.name || '';
    document.getElementById('e-age').value = p.age || '';
    document.getElementById('e-gender').value = p.gender || '';
    document.getElementById('e-contact').value = p.contact || '';
    document.getElementById('e-blood').value = p.blood_group || '';
    document.getElementById('e-diagnosis').value = p.diagnosis || '';
    document.getElementById('editCard').style.display = 'block';
    switchTab('edit');
    document.getElementById('lookupId').value = p.id;
  }

  async function updatePatient(){
    if(!currentEditId) return;
    const body = {
      name: document.getElementById('e-name').value,
      age: parseInt(document.getElementById('e-age').value),
      gender: document.getElementById('e-gender').value,
      contact: document.getElementById('e-contact').value,
      blood_group: document.getElementById('e-blood').value || null,
      diagnosis: document.getElementById('e-diagnosis').value || null
    };
    try {
      const r = await fetch(getBase()+'/api/patients/'+currentEditId, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
      const d = await r.json();
      if(r.ok){ toast(`Patient "${d.name}" updated!`); document.getElementById('lastAction').textContent='updated'; loadPatients(); }
      else toast(d.error || 'Update failed', false);
    } catch(e){ toast('Cannot reach API', false); }
  }

  async function deletePatient(){
    const id = document.getElementById('lookupId').value;
    if(!id) return;
    deleteById(id);
  }

  async function deleteById(id){
    if(!confirm(`Delete patient ID ${id}?`)) return;
    try {
      const r = await fetch(getBase()+'/api/patients/'+id, {method:'DELETE'});
      const d = await r.json();
      if(r.ok){ toast(d.message); document.getElementById('lastAction').textContent='deleted'; loadPatients(); }
    } catch(e){ toast('Cannot reach API', false); }
  }

  checkHealth();
</script>
</body>
</html>
